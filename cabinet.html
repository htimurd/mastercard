<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История операций</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; }
        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .back-btn { color: #ff5f00; text-decoration: none; font-size: 24px; margin-right: 20px; }
        .hist-item { background: #151517; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #ff5f00; }
        .hist-info div:first-child { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
        .hist-info div:last-child { font-size: 11px; color: #555; }
        .amount { font-weight: bold; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">←</a>
            <h2 style="margin:0">Транзакции</h2>
        </div>

        <div id="historyList">
            <!-- Список пуст -->
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('mc_current_user'));
        const allHistory = JSON.parse(localStorage.getItem('mc_history') || "[]");

        const list = document.getElementById('historyList');

        if(!user) {
            window.location.href = 'index.html';
        }

        // Фильтруем историю: показываем только те переводы, где отправитель — текущий пользователь
        const myHistory = allHistory.filter(h => h.fromPhone === user.phone);

        if(myHistory.length === 0) {
            list.innerHTML = '<p style="color:#333; text-align:center; margin-top:50px;">У вас еще не было переводов</p>';
        } else {
            myHistory.forEach(h => {
                list.innerHTML += `
                    <div class="hist-item">
                        <div class="hist-info">
                            <div>Кому: ${h.toName}</div>
                            <div>${h.date} • ${h.toPhone}</div>
                        </div>
                        <div class="amount">-${h.amount.toFixed(2)}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
