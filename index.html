<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MasterCard Network Pro</title>
    <style>
        :root { --primary: #ff5f00; --bg: #0a0a0a; --card-bg: #151517; --input-bg: #222; }
        body { background-color: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        
        /* Зона вызова админки */
        #secret-trigger { width: 60px; height: 60px; position: absolute; top: 0; left: 0; z-index: 1000; }

        #authScreen { display: flex; flex-direction: column; justify-content: center; width: 100%; max-width: 350px; padding: 20px; text-align: center; }
        .auth-box { background: var(--card-bg); padding: 30px; border-radius: 25px; border: 1px solid #333; }
        .app-wrapper { width: 100%; max-width: 450px; padding: 20px; display: none; }
        
        /* Карта */
        .card { width: 100%; height: 215px; background: linear-gradient(135deg, #1e1e1e 0%, #000 100%); border-radius: 20px; padding: 25px; box-sizing: border-box; position: relative; border: 1px solid #333; margin-bottom: 25px; }
        .chip { width: 45px; height: 35px; background: linear-gradient(135deg, #e5c06d, #b8860b); border-radius: 6px; margin-bottom: 20px; }
        .balance-amount { font-size: 32px; font-weight: 700; color: #fff; }
        .card-num { font-family: monospace; color: #555; margin-top: 40px; letter-spacing: 2px; font-size: 16px; }
        .mc-logo { position: absolute; bottom: 20px; right: 20px; display: flex; }
        .circle { width: 35px; height: 35px; border-radius: 50%; opacity: 0.9; }
        .red { background: #eb001b; margin-right: -14px; }
        .orange { background: #ff5f00; }
        
        .section { background: var(--card-bg); padding: 25px; border-radius: 24px; border: 1px solid #222; }
        .input-group { margin-bottom: 18px; text-align: left; }
        label { display: block; font-size: 11px; color: #666; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; background: var(--input-bg); border: 1px solid #333; border-radius: 12px; padding: 14px; color: white; box-sizing: border-box; outline: none; }

        .btn { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 14px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-nav { background: #2c2c2e; margin-top: 10px; }

        /* Модалки (Успех и Админка) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal { background: #1c1c1e; width: 85%; max-width: 320px; padding: 30px; border-radius: 28px; text-align: center; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="secret-trigger" onclick="handleAdminTrigger()"></div>

    <!-- ВХОД -->
    <div id="authScreen">
        <div class="auth-box">
            <h2 style="margin-top:0">MasterCard</h2>
            <div class="input-group"><label>Имя</label><input type="text" id="authName" placeholder="Иван"></div>
            <div class="input-group"><label>Телефон</label><input type="text" id="authPhone" placeholder="+375..."></div>
            <button class="btn" onclick="handleAuth()">ВОЙТИ</button>
        </div>
    </div>

    <!-- ПРИЛОЖЕНИЕ -->
    <div class="app-wrapper" id="appScreen">
        <div class="card">
            <div class="chip"></div>
            <div style="font-size: 12px; color: #888;" id="helloUser">Загрузка...</div>
            <div class="balance-amount" id="userBal">0.00 BYN</div>
            <div class="card-num" id="dispCardNum">5412 •••• •••• 7741</div>
            <div class="mc-logo"><div class="circle red"></div><div class="circle orange"></div></div>
        </div>

        <div class="section">
            <div class="input-group"><label>Телефон друга</label><input type="text" id="targetPhone" placeholder="+375..."></div>
            <div class="input-group"><label>Сумма</label><input type="number" id="sendAmount" placeholder="0.00"></div>
            <button class="btn" onclick="sendMoney()">ОТПРАВИТЬ</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-nav" onclick="window.location.href='account.html'">АККАУНТ</button>
                <button class="btn btn-nav" onclick="window.location.href='cabinet.html'">ИСТОРИЯ</button>
            </div>
            <button class="btn" style="background:none; color:#444; font-size:12px;" onclick="logout()">ВЫЙТИ</button>
        </div>
    </div>

    <!-- МОДАЛКА УСПЕХА -->
    <div id="statusOverlay" class="overlay">
        <div class="modal">
            <div style="font-size: 50px; color: #4cd137;">✓</div>
            <h3>Готово</h3>
            <p id="resMsg" style="color: #888; font-size: 14px; margin-bottom: 20px;"></p>
            <button class="btn" onclick="closeModal()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <!-- СТАРАЯ ДОБРАЯ АДМИНКА -->
    <div id="adminOverlay" class="overlay">
        <div class="modal">
            <h3 style="color:var(--primary); margin-top:0;">ADMIN PANEL</h3>
            <div class="input-group">
                <label>Установить баланс</label>
                <input type="number" id="admBal" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Номер карты</label>
                <input type="text" id="admCard" placeholder="5412 0000...">
            </div>
            <button class="btn" onclick="applyAdmin()">ПРИМЕНИТЬ</button>
            <button class="btn btn-nav" onclick="closeAdmin()">ОТМЕНА</button>
        </div>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('mc_users')) || [];
        let currentUser = JSON.parse(localStorage.getItem('mc_current_user')) || null;

        if (currentUser) showApp();

        function handleAuth() {
            const name = document.getElementById('authName').value.trim();
            const phone = document.getElementById('authPhone').value.trim();
            if(!name || !phone) return alert("Заполните поля!");

            let user = users.find(u => u.phone === phone);
            if(!user) {
                user = { name: name, phone: phone, balance: 0.00, card: "5412 7741 0000 1111" };
                users.push(user);
                localStorage.setItem('mc_users', JSON.stringify(users));
            }
            currentUser = user;
            localStorage.setItem('mc_current_user', JSON.stringify(currentUser));
            showApp();
        }

        function showApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
            document.getElementById('helloUser').innerText = "Аккаунт: " + currentUser.name;
            updateDisplay();
        }

        function updateDisplay() {
            users = JSON.parse(localStorage.getItem('mc_users')) || [];
            let freshMe = users.find(u => u.phone === currentUser.phone);
            if(freshMe) currentUser = freshMe;

            document.getElementById('userBal').innerText = currentUser.balance.toLocaleString('ru-RU', {minimumFractionDigits: 2}) + " BYN";
            document.getElementById('dispCardNum').innerText = currentUser.card || "5412 •••• •••• 7741";
            localStorage.setItem('mc_current_user', JSON.stringify(currentUser));
        }

        function sendMoney() {
            const targetPhone = document.getElementById('targetPhone').value.trim();
            const amount = parseFloat(document.getElementById('sendAmount').value);
            users = JSON.parse(localStorage.getItem('mc_users')) || [];

            if(!amount || amount <= 0) return alert("Введите сумму!");
            if(amount > currentUser.balance) return alert("Недостаточно средств!");

            let recIdx = users.findIndex(u => u.phone === targetPhone);
            if(recIdx === -1) return alert("Друг не найден!");

            currentUser.balance -= amount;
            users[recIdx].balance += amount;

            let myIdx = users.findIndex(u => u.phone === currentUser.phone);
            users[myIdx].balance = currentUser.balance;

            localStorage.setItem('mc_users', JSON.stringify(users));
            
            let history = JSON.parse(localStorage.getItem('mc_history') || "[]");
            history.unshift({ fromPhone: currentUser.phone, toPhone: targetPhone, toName: users[recIdx].name, amount: amount, date: new Date().toLocaleString() });
            localStorage.setItem('mc_history', JSON.stringify(history));

            document.getElementById('resMsg').innerText = `Отправлено ${amount} BYN для ${users[recIdx].name}`;
            document.getElementById('statusOverlay').style.display = 'flex';
            updateDisplay();
        }

        // ЛОГИКА АДМИНКИ
        let clicks = 0, timer;
        function handleAdminTrigger() {
            clicks++; clearTimeout(timer);
            timer = setTimeout(() => clicks = 0, 500);
            if (clicks === 3 && currentUser) {
                document.getElementById('adminOverlay').style.display = 'flex';
                document.getElementById('admBal').value = currentUser.balance;
                document.getElementById('admCard').value = currentUser.card || "";
            }
        }

        function applyAdmin() {
            const newBal = document.getElementById('admBal').value;
            const newCard = document.getElementById('admCard').value;
            
            if(newBal !== "") currentUser.balance = parseFloat(newBal);
            if(newCard !== "") currentUser.card = newCard;

            users = JSON.parse(localStorage.getItem('mc_users')) || [];
            let myIdx = users.findIndex(u => u.phone === currentUser.phone);
            if(myIdx !== -1) users[myIdx] = currentUser;

            localStorage.setItem('mc_users', JSON.stringify(users));
            updateDisplay();
            closeAdmin();
        }

        function closeAdmin() { document.getElementById('adminOverlay').style.display = 'none'; }
        function logout() { localStorage.removeItem('mc_current_user'); location.reload(); }
        function closeModal() { document.getElementById('statusOverlay').style.display = 'none'; }
    </script>
</body>
</html>
