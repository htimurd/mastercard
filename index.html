<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MasterCard Network</title>
    <style>
        :root { --primary: #ff5f00; --bg: #0a0a0a; --card-bg: #151517; --input-bg: #222; }
        body { background-color: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        
        /* Экран входа */
        #authScreen { display: flex; flex-direction: column; justify-content: center; width: 100%; max-width: 350px; padding: 20px; text-align: center; }
        .auth-box { background: var(--card-bg); padding: 30px; border-radius: 25px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        /* Основное приложение */
        .app-wrapper { width: 100%; max-width: 450px; padding: 20px; display: none; }
        
        /* Стиль карты */
        .card { width: 100%; height: 215px; background: linear-gradient(135deg, #1e1e1e 0%, #000 100%); border-radius: 20px; padding: 25px; box-sizing: border-box; position: relative; border: 1px solid #333; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        .chip { width: 45px; height: 35px; background: linear-gradient(135deg, #e5c06d, #b8860b); border-radius: 6px; margin-bottom: 20px; }
        .balance-amount { font-size: 32px; font-weight: 700; color: #fff; }
        .card-num { font-family: monospace; color: #555; margin-top: 40px; letter-spacing: 2px; font-size: 16px; }
        .mc-logo { position: absolute; bottom: 20px; right: 20px; display: flex; }
        .circle { width: 35px; height: 35px; border-radius: 50%; opacity: 0.9; }
        .red { background: #eb001b; margin-right: -14px; }
        .orange { background: #ff5f00; }
        
        /* Формы */
        .section { background: var(--card-bg); padding: 25px; border-radius: 24px; border: 1px solid #222; }
        .input-group { margin-bottom: 18px; text-align: left; }
        label { display: block; font-size: 11px; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; background: var(--input-bg); border: 1px solid #333; border-radius: 12px; padding: 14px; color: white; box-sizing: border-box; outline: none; font-size: 15px; }
        input:focus { border-color: var(--primary); }

        .btn { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 14px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .btn-nav { background: #2c2c2e; margin-top: 10px; }
        .btn-exit { background: none; color: #444; text-decoration: underline; font-size: 13px; border: none; margin-top: 20px; cursor: pointer; }

        /* Окно успеха */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: #1c1c1e; width: 85%; max-width: 320px; padding: 35px; border-radius: 30px; text-align: center; border: 1px solid #333; }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="authScreen">
        <div class="auth-box">
            <h2 style="margin-top:0">MasterCard</h2>
            <div class="input-group">
                <label>Ваше Имя</label>
                <input type="text" id="authName" placeholder="Иван">
            </div>
            <div class="input-group">
                <label>Ваш Телефон</label>
                <input type="text" id="authPhone" placeholder="+375...">
            </div>
            <button class="btn" onclick="handleAuth()">ВОЙТИ / СОЗДАТЬ</button>
        </div>
    </div>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <div class="app-wrapper" id="appScreen">
        <div class="card">
            <div class="chip"></div>
            <div style="font-size: 12px; color: #888;" id="helloUser">Привет, Пользователь</div>
            <div class="balance-amount" id="userBal">0.00 BYN</div>
            <div class="card-num">5412 •••• •••• 7741</div>
            <div class="mc-logo"><div class="circle red"></div><div class="circle orange"></div></div>
        </div>

        <div class="section">
            <h3 style="margin-top:0">Новый перевод</h3>
            <div class="input-group">
                <label>Номер телефона</label>
                <input type="text" id="targetPhone" placeholder="+375...">
            </div>
            <div class="input-group">
                <label>Сумма перевода</label>
                <input type="number" id="sendAmount" placeholder="0.00">
            </div>
            <button class="btn" onclick="sendMoney()">ОТПРАВИТЬ СРЕДСТВА</button>
            
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-nav" onclick="window.location.href='account.html'">АККАУНТ</button>
                <button class="btn btn-nav" onclick="window.location.href='cabinet.html'">ИСТОРИЯ</button>
            </div>
            
            <center><button class="btn-exit" onclick="logout()">Выйти из системы</button></center>
        </div>
    </div>

    <!-- УСПЕХ -->
    <div id="statusOverlay" class="overlay">
        <div class="modal">
            <div style="font-size: 60px; color: #4cd137; margin-bottom: 10px;">✓</div>
            <h3>Перевод выполнен</h3>
            <p id="resMsg" style="color: #888; font-size: 14px; line-height: 1.5; margin-bottom: 25px;"></p>
            <button class="btn" onclick="closeModal()">ОТЛИЧНО</button>
        </div>
    </div>

    <script>
        // База данных в памяти браузера
        let users = JSON.parse(localStorage.getItem('mc_users')) || [];
        let currentUser = JSON.parse(localStorage.getItem('mc_current_user')) || null;

        // Если пользователь уже в системе, сразу показываем приложение
        if (currentUser) {
            showApp();
        }

        function handleAuth() {
            const name = document.getElementById('authName').value.trim();
            const phone = document.getElementById('authPhone').value.trim();

            if(!name || !phone) return alert("Введите имя и телефон!");

            // Ищем пользователя по телефону
            let user = users.find(u => u.phone === phone);
            
            if(!user) {
                // Если нет — создаем нового
                user = { name: name, phone: phone, balance: 1000.00 };
                users.push(user);
                saveAll();
            }

            currentUser = user;
            localStorage.setItem('mc_current_user', JSON.stringify(currentUser));
            showApp();
        }

        function showApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
            document.getElementById('helloUser').innerText = "Аккаунт: " + currentUser.name;
            updateBalanceDisplay();
        }

        function updateBalanceDisplay() {
            document.getElementById('userBal').innerText = currentUser.balance.toLocaleString('ru-RU', {minimumFractionDigits: 2}) + " BYN";
        }

        function sendMoney() {
            const targetPhone = document.getElementById('targetPhone').value.trim();
            const amount = parseFloat(document.getElementById('sendAmount').value);

            if(!amount || amount <= 0) return alert("Введите сумму!");
            if(amount > currentUser.balance) return alert("Недостаточно средств!");
            if(targetPhone === currentUser.phone) return alert("Нельзя отправить самому себе!");

            // Ищем получателя в базе
            let recipient = users.find(u => u.phone === targetPhone);

            if(!recipient) {
                return alert("Пользователь с номером " + targetPhone + " не найден в сети!");
            }

            // Процесс перевода
            currentUser.balance -= amount;
            recipient.balance += amount;

            // Запись в общую историю
            let history = JSON.parse(localStorage.getItem('mc_history') || "[]");
            history.unshift({
                fromPhone: currentUser.phone,
                toPhone: recipient.phone,
                toName: recipient.name,
                amount: amount,
                date: new Date().toLocaleString('ru-RU', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'})
            });

            localStorage.setItem('mc_history', JSON.stringify(history));
            
            // Сохраняем обновленные данные
            saveAll();
            localStorage.setItem('mc_current_user', JSON.stringify(currentUser));

            // Показ успеха
            document.getElementById('resMsg').innerText = `Сумма ${amount} BYN успешно перечислена пользователю ${recipient.name}.`;
            document.getElementById('statusOverlay').style.display = 'flex';
            updateBalanceDisplay();
        }

        function saveAll() {
            // Обновляем текущего пользователя в общем массиве перед сохранением
            const idx = users.findIndex(u => u.phone === currentUser?.phone);
            if(idx !== -1) users[idx] = currentUser;
            localStorage.setItem('mc_users', JSON.stringify(users));
        }

        function logout() {
            localStorage.removeItem('mc_current_user');
            location.reload();
        }

        function closeModal() {
            document.getElementById('statusOverlay').style.display = 'none';
            document.getElementById('sendAmount').value = '';
            document.getElementById('targetPhone').value = '';
        }
    </script>
</body>
</html>
