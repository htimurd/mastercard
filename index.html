<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MasterCard Banking Pro</title>
    <style>
        :root { --primary: #ff5f00; --bg: #000; --card-bg: #151517; --input-bg: #222; }
        body { background-color: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; }
        
        /* Главный контейнер адаптивный */
        .app-wrapper { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; 
            padding: 40px 20px; max-width: 1000px; margin: 0 auto; 
        }

        #secret-trigger { width: 50px; height: 50px; position: absolute; top: 0; left: 0; z-index: 1000; }

        /* Левая колонка (Карта) */
        .left-col { flex: 1; min-width: 320px; max-width: 400px; }
        
        .card { 
            width: 100%; height: 220px; background: linear-gradient(135deg, #1e1e1e 0%, #000000 100%); 
            border-radius: 20px; padding: 30px; box-sizing: border-box; position: relative; 
            border: 1px solid #333; box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
        }
        .chip { width: 50px; height: 38px; background: linear-gradient(135deg, #e5c06d, #b8860b); border-radius: 8px; margin-bottom: 25px; }
        .balance-amount { font-size: 32px; font-weight: 700; margin-top: 5px; }
        .card-number { position: absolute; bottom: 30px; left: 30px; font-family: monospace; font-size: 18px; color: #aaa; letter-spacing: 2px; }
        .mc-logo { position: absolute; bottom: 25px; right: 25px; display: flex; }
        .circle { width: 40px; height: 40px; border-radius: 50%; }
        .red { background: #eb001b; margin-right: -16px; opacity: 0.9; }
        .orange { background: #ff5f00; opacity: 0.9; }

        /* Правая колонка (Форма) */
        .right-col { flex: 1.2; min-width: 320px; max-width: 500px; }
        .section { background: var(--card-bg); padding: 25px; border-radius: 24px; border: 1px solid #222; }

        .type-selector { display: flex; background: var(--input-bg); border-radius: 12px; margin-bottom: 20px; padding: 5px; }
        .type-btn { flex: 1; padding: 12px; border: none; background: none; color: #666; font-size: 13px; cursor: pointer; border-radius: 10px; transition: 0.3s; font-weight: 600; }
        .type-btn.active { background: #333; color: white; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; color: #777; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .transfer-input, .transfer-select { width: 100%; background: var(--input-bg); border: 1px solid #333; border-radius: 12px; padding: 14px; color: white; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.2s; }
        .transfer-input:focus { border-color: var(--primary); }
        
        .btn-send { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 14px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-send:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: #2c2c2e; margin-top: 12px; }

        /* Модалки */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal { background: #1c1c1e; width: 90%; max-width: 350px; padding: 30px; border-radius: 28px; text-align: center; border: 1px solid #333; }
        .loader { border: 4px solid #333; border-top: 4px solid var(--primary); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Адаптация под мобилки */
        @media (max-width: 768px) {
            .app-wrapper { padding: 20px 15px; flex-direction: column; align-items: center; }
            .left-col, .right-col { max-width: 100%; width: 100%; }
        }
    </style>
</head>
<body>

    <div id="secret-trigger" onclick="handleAdmin()"></div>

    <div class="app-wrapper">
        <!-- КАРТА СЛЕВА -->
        <div class="left-col">
            <div class="card">
                <div class="chip"></div>
                <div style="font-size: 14px; color: #888;">Баланс счета</div>
                <div class="balance-amount" id="mainBal">0.00 BYN</div>
                <div class="card-number" id="mainNum">5412 0000 0000 0000</div>
                <div class="mc-logo"><div class="circle red"></div><div class="circle orange"></div></div>
            </div>
            
            <div style="margin-top: 20px; padding: 0 10px;">
                <p style="color: #444; font-size: 13px; line-height: 1.5;">* Это демонстрационный интерфейс MasterCard. Все операции проводятся в защищенном режиме имитации.</p>
            </div>
        </div>

        <!-- ФОРМА СПРАВА -->
        <div class="right-col">
            <div class="section">
                <div class="input-group">
                    <label>Регион и Валюта</label>
                    <select class="transfer-select" id="appCurrency" onchange="changeCurrency(this.value)">
                        <option value="BYN">Беларусь (BYN)</option>
                        <option value="RUB">Россия (RUB)</option>
                        <option value="USD">США (USD)</option>
                        <option value="EUR">Европа (EUR)</option>
                    </select>
                </div>

                <div class="type-selector">
                    <button class="type-btn active" id="btnCard" onclick="setType('card')">ПО КАРТЕ</button>
                    <button class="type-btn" id="btnPhone" onclick="setType('phone')">ПО ТЕЛЕФОНУ</button>
                </div>

                <div class="input-group">
                    <label>Получатель</label>
                    <input type="text" class="transfer-input" id="tName" placeholder="Имя Фамилия">
                </div>

                <div class="input-group">
                    <label id="targetLabel">Номер карты</label>
                    <input type="text" class="transfer-input" id="tTarget" placeholder="0000 0000 0000 0000">
                </div>

                <div class="input-group">
                    <label>Сумма перевода (<span class="currMark">BYN</span>)</label>
                    <input type="number" class="transfer-input" id="tAmount" placeholder="0.00">
                </div>
                
                <button class="btn-send" onclick="startTransfer()">ПОДТВЕРДИТЬ И ОТПРАВИТЬ</button>
                <button class="btn-send btn-secondary" onclick="window.location.href='cabinet.html'">ПЕРЕЙТИ В КАБИНЕТ</button>
            </div>
        </div>
    </div>

    <!-- Модалки -->
    <div id="statusOverlay" class="overlay">
        <div class="modal">
            <div id="loaderCont"><div class="loader"></div><p>Выполняем транзакцию...</p></div>
            <div id="successCont" style="display:none;">
                <div style="font-size: 60px; color: #4cd137;">✓</div>
                <h3 style="margin: 15px 0;">Успешно!</h3>
                <p id="successTxt" style="font-size: 15px; color: #aaa; margin-bottom: 25px; line-height: 1.4;"></p>
                <button class="btn-send" onclick="closeStatus()">ВЕРНУТЬСЯ</button>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="overlay">
        <div class="modal">
            <h3 style="color:var(--primary); margin-top:0;">ADMIN PANEL</h3>
            <input type="number" id="setBal" class="transfer-input" style="margin-bottom:10px" placeholder="Установить баланс">
            <input type="text" id="setNum" class="transfer-input" placeholder="Номер карты">
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn-send" style="margin:0" onclick="applyAdmin()">OK</button>
                <button class="btn-send btn-secondary" style="margin:0" onclick="closeAdmin()">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <script>
        let currentBalance = parseFloat(localStorage.getItem('balance')) || 1000.00;
        let cardNumber = localStorage.getItem('cardNumber') || "5412 9000 " + Math.floor(1000+Math.random()*8999) + " " + Math.floor(1000+Math.random()*8999);
        let appCurrency = localStorage.getItem('appCurrency') || "BYN";
        let transferType = 'card';

        const phoneCodes = { 'BYN': '+375', 'RUB': '+7', 'USD': '+1', 'EUR': '+49' };
        document.getElementById('appCurrency').value = appCurrency;

        // Авто-пробелы и ограничение ввода
        document.getElementById('tTarget').addEventListener('input', function (e) {
            let val = e.target.value.replace(/[^\d+]/g, '');
            if (transferType === 'card') {
                val = val.replace(/\D/g, '');
                e.target.value = val.match(/.{1,4}/g)?.join(' ').substring(0, 19) || '';
            } else {
                if(!val.startsWith(phoneCodes[appCurrency])) val = phoneCodes[appCurrency];
                e.target.value = val.substring(0, 15);
            }
        });

        function changeCurrency(val) {
            appCurrency = val;
            localStorage.setItem('appCurrency', val);
            if(transferType === 'phone') setType('phone');
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('mainBal').innerText = currentBalance.toLocaleString('ru-RU', {minimumFractionDigits: 2}) + " " + appCurrency;
            document.getElementById('mainNum').innerText = cardNumber;
            document.querySelectorAll('.currMark').forEach(el => el.innerText = appCurrency);
            localStorage.setItem('balance', currentBalance);
            localStorage.setItem('cardNumber', cardNumber);
        }
        updateDisplay();

        function setType(type) {
            transferType = type;
            document.getElementById('btnCard').classList.toggle('active', type === 'card');
            document.getElementById('btnPhone').classList.toggle('active', type === 'phone');
            const input = document.getElementById('tTarget');
            document.getElementById('targetLabel').innerText = type === 'card' ? 'Номер карты' : 'Номер телефона';
            input.value = type === 'card' ? '' : phoneCodes[appCurrency];
            input.placeholder = type === 'card' ? '0000 0000 0000 0000' : phoneCodes[appCurrency] + '...';
        }

        function startTransfer() {
            const amount = parseFloat(document.getElementById('tAmount').value);
            const name = document.getElementById('tName').value;
            const target = document.getElementById('tTarget').value;

            if(!amount || !name || target.length < 5) return alert("Заполните все данные!");
            if(amount > currentBalance) return alert("Недостаточно средств на счете!");

            document.getElementById('statusOverlay').style.display = 'flex';
            document.getElementById('loaderCont').style.display = 'block';
            document.getElementById('successCont').style.display = 'none';

            setTimeout(() => {
                currentBalance -= amount;
                let history = JSON.parse(localStorage.getItem('transfers') || "[]");
                history.unshift({
                    name: name, target: target, amount: amount,
                    currency: appCurrency, date: new Date().toLocaleString('ru-RU', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'})
                });
                localStorage.setItem('transfers', JSON.stringify(history));
                updateDisplay();
                document.getElementById('loaderCont').style.display = 'none';
                document.getElementById('successCont').style.display = 'block';
                document.getElementById('successTxt').innerText = `Сумма ${amount} ${appCurrency} успешно переведена получателю ${name}.`;
                document.getElementById('tAmount').value = '';
                document.getElementById('tName').value = '';
            }, 1800);
        }

        let clicks = 0, timer;
        function handleAdmin() {
            clicks++; clearTimeout(timer);
            timer = setTimeout(() => clicks = 0, 500);
            if (clicks === 3) document.getElementById('adminPanel').style.display = 'flex';
        }
        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
        function applyAdmin() {
            const b = document.getElementById('setBal').value;
            const n = document.getElementById('setNum').value;
            if(b) currentBalance = parseFloat(b);
            if(n) cardNumber = n;
            updateDisplay(); closeAdmin();
        }
        function closeStatus() { document.getElementById('statusOverlay').style.display = 'none'; }
    </script>
</body>
</html>
